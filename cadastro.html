<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="cadastro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        .erro-msg {
            width: 100%;
            background: #fdecea;
            border: 1.5px solid #e24b4a;
            color: #c0392b;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 10px;
            display: none;
        }
        .erro-msg.visivel { display: block; }
    </style>
</head>

<body>
    <div class="fundo-pagina">

        <div class="frame-celular">

            <div class="notificacoes-ilustrativo">
                <span class="horario">5:67</span>
                <div class="carga-celular">
                    <i class="fa-solid fa-battery-three-quarters"></i>
                </div>
            </div>

            <div class="content">

                <div class="logo-bg">
                    <div class="logo-icon">
                        <img src="logo-ilustrativa.png" alt="Logo Repre">
                    </div>
                    <span class="logo-text">REPRE</span>
                </div>

                <h2 class="sub-text">Crie sua conta para acessar sua turma.</h2>

                <div class="erro-msg" id="erroCadastro"></div>

                <input class="form-input" type="text" id="cadNome" placeholder="Nome Completo" required>
                <input class="form-input" type="email" id="cadEmail" placeholder="Email" required>
                <input class="form-input" type="password" id="cadSenha" placeholder="Senha" required>
                <button class="btn btn-cadastrar" id="btnCadastrar">Cadastrar</button>

            </div>

            <div class="home-linha"></div>

        </div>

    </div>

    <script src="RepreBD.js"></script>
    <script>
        document.getElementById('btnCadastrar').addEventListener('click', () => {
            const nome  = document.getElementById('cadNome').value.trim();
            const email = document.getElementById('cadEmail').value.trim();
            const senha = document.getElementById('cadSenha').value;
            const erroEl = document.getElementById('erroCadastro');

            const resultado = RepreDB.cadastrar(nome, email, senha);

            if (resultado.ok) {
                window.location.href = 'home.html';
            } else {
                erroEl.textContent = resultado.erro;
                erroEl.classList.add('visivel');
            }
        });
    </script>

</body>
</html>
                <form action="home.html" method="get" class="cadastro-form">
                    <input class="form-input" type="text" name="name" placeholder="Nome Completo" required>
                    <input class="form-input" type="email" name="email" placeholder="Email" required>
                    <input class="form-input" type="password" name="password" placeholder="Senha" required>
                    <button type="submit" class="btn btn-cadastrar">Cadastrar</button>
                </form>

            </div>
            
            <div class="home-linha"></div>

        </div>

    </div>

</body>

</html>
